<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MTR Compras{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <meta http-equiv="Cache-Control" content="no-store">
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-blue-900 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="/dashboard" class="font-bold text-xl tracking-wide">MTR Compras</a>
                <div class="flex items-center gap-4 text-sm">
                    {% if user %}
                    <span class="hidden sm:block text-blue-200">{{ user.name }} · <span class="uppercase font-semibold">{{ user.role }}</span></span>
                    <a href="/purchases/new" class="bg-blue-600 hover:bg-blue-500 px-3 py-2 rounded-lg font-semibold">+ Nueva</a>
                    <a href="/purchases" class="hidden sm:block hover:text-blue-200">Compras</a>
                    <a href="/suppliers" class="hidden sm:block hover:text-blue-200">Proveedores</a>
                    {% if user.role == "superadmin" %}
                    <a href="/admin/users" class="hidden sm:block hover:text-blue-200">Usuarios</a>
                    {% endif %}
                    <a href="/logout" class="text-blue-300 hover:text-white text-xs">Salir</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
