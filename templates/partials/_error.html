{# Caja de error de formulario unificada. Uso: {% include "partials/_error.html" %}
   Requiere la variable `error` en el contexto (string). No renderiza si es None/vacía. #}
{% if error %}
<div class="flex items-start gap-2 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 mb-5 text-sm">
  <svg class="w-4 h-4 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
  <span>{{ error }}</span>
</div>
{% endif %}
