{% extends "base.html" %}
{% block title %}Nuevo proyecto — MTR{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto">
  <div class="mb-6">
    <a href="/projects" class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 mb-3">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Proyectos
    </a>
    <h1 class="text-xl font-semibold text-gray-900">Nuevo proyecto</h1>
  </div>

  {% include "partials/_error.html" %}

  <form method="post" action="/projects/new" class="space-y-4">

    <!-- Datos principales -->
    <div class="bg-white border border-gray-100 rounded-2xl shadow-sm p-5">
      <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-4">Datos principales</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Nombre del proyecto <span class="text-red-400">*</span></label>
          <input type="text" name="name" required placeholder="Ej: Instalación sistema de riego nave 3"
            class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 bg-gray-50">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Planta</label>
            <select name="plant" class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 bg-gray-50">
              <option value="">— Sin definir —</option>
              {% for p in plants %}
              <option value="{{ p }}" {% if user.plant == p %}selected{% endif %}>{{ p }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Responsable</label>
            <input type="text" name="responsible" placeholder="Nombre del responsable"
              class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 bg-gray-50">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Área / Cliente solicitante</label>
          <input type="text" name="area" placeholder="Ej: Producción, Administración, Cliente X"
            class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 bg-gray-50">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Estado</label>
            <select name="status" class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 bg-gray-50">
              {% for s in statuses %}
              <option value="{{ s }}" {% if s == 'pendiente' %}selected{% endif %}>{{ s|replace('_',' ')|capitalize }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Prioridad</label>
            <select name="priority" class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 bg-gray-50">
              {% for p in priorities %}
              <option value="{{ p }}" {% if p == 'media' %}selected{% endif %}>{{ p|capitalize }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Descripción -->
    <div class="bg-white border border-gray-100 rounded-2xl shadow-sm p-5">
      <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-4">Descripción</h2>
      <textarea name="description" rows="3"
        placeholder="Describí el alcance del proyecto, objetivos, contexto..."
        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 bg-gray-50 resize-y placeholder-gray-400"></textarea>
    </div>

    <!-- Fechas y presupuesto -->
    <div class="bg-white border border-gray-100 rounded-2xl shadow-sm p-5">
      <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-4">Fechas y presupuesto <span class="text-gray-300 font-normal normal-case">(opcionales)</span></h2>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Fecha inicio</label>
          <input type="date" name="start_date" value="{{ today }}"
            class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 bg-gray-50">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Fecha fin estimada</label>
          <input type="date" name="estimated_end_date"
            class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 bg-gray-50">
        </div>
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Presupuesto estimado ($)</label>
          <input type="text" name="estimated_budget" inputmode="decimal" placeholder="0.00"
            class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 bg-gray-50">
        </div>
      </div>
    </div>

    <!-- Observaciones -->
    <div class="bg-white border border-gray-100 rounded-2xl shadow-sm p-5">
      <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-4">Observaciones <span class="text-gray-300 font-normal normal-case">(opcional)</span></h2>
      <textarea name="notes" rows="2"
        placeholder="Notas internas, condiciones especiales, restricciones..."
        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 bg-gray-50 resize-y placeholder-gray-400"></textarea>
    </div>

    <button type="submit"
      class="w-full bg-violet-600 hover:bg-violet-700 text-white font-semibold py-4 rounded-2xl text-sm shadow-sm">
      Crear proyecto
    </button>
  </form>
</div>

{% endblock %}
