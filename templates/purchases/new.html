{% extends "base.html" %}
{% block title %}Nueva Compra — MTR{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <a href="/dashboard" class="text-blue-600 text-sm">← Volver</a>
        <h2 class="text-2xl font-bold text-gray-800 mt-2">Nueva solicitud de compra</h2>
    </div>

    {% if error %}
    <div class="bg-red-50 border border-red-300 text-red-700 rounded-lg px-4 py-3 mb-4">{{ error }}</div>
    {% endif %}

    <form method="post" action="/purchases/new" class="bg-white rounded-xl shadow-sm p-6 space-y-5">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Planta *</label>
                <select name="plant" required class="w-full border rounded-lg px-3 py-3 text-base">
                    {% for p in plants %}
                    <option value="{{ p }}" {% if user.plant == p %}selected{% endif %}>{{ p }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Área *</label>
                <select name="area" required class="w-full border rounded-lg px-3 py-3 text-base">
                    {% for a in areas %}
                    <option value="{{ a }}">{{ a }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Proveedor *</label>
            <select name="supplier_id" required class="w-full border rounded-lg px-3 py-3 text-base">
                <option value="">Seleccionar proveedor...</option>
                {% for s in suppliers %}
                <option value="{{ s.id }}">{{ s.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Descripción de lo que se compra *</label>
            <textarea name="description" required rows="3"
                placeholder="Ej: 10 metros de cable eléctrico 2.5mm, marca X"
                class="w-full border rounded-lg px-3 py-3 text-base resize-none"></textarea>
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Motivo de la compra *</label>
            <textarea name="reason" required rows="2"
                placeholder="Ej: Reparación tablero eléctrico sector A"
                class="w-full border rounded-lg px-3 py-3 text-base resize-none"></textarea>
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Monto estimado ($)</label>
            <input type="text" name="estimated_amount" placeholder="0.00" inputmode="decimal"
                class="w-full border rounded-lg px-3 py-3 text-base">
            <p class="text-xs text-gray-400 mt-1">Sin IVA. Opcional pero recomendado.</p>
        </div>

        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Notas adicionales</label>
            <textarea name="notes" rows="2" placeholder="Urgencia, especificaciones extra, etc."
                class="w-full border rounded-lg px-3 py-3 text-base resize-none"></textarea>
        </div>

        <div class="pt-2">
            <button type="submit"
                class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-4 rounded-xl text-lg">
                Enviar solicitud
            </button>
        </div>
    </form>
</div>
{% endblock %}
