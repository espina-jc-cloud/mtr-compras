{% extends "base.html" %}
{% block title %}Nuevo Usuario — MTR{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <a href="/admin/users" class="text-blue-600 text-sm">← Usuarios</a>
    <h2 class="text-2xl font-bold text-gray-800 mt-2 mb-6">Nuevo usuario</h2>
    {% if error %}<div class="bg-red-50 border border-red-300 text-red-700 rounded-lg px-4 py-3 mb-4">{{ error }}</div>{% endif %}
    <form method="post" action="/admin/users/new" class="bg-white rounded-xl shadow-sm p-6 space-y-4">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Nombre completo *</label>
            <input type="text" name="name" required class="w-full border rounded-lg px-3 py-3">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Email *</label>
            <input type="email" name="email" required class="w-full border rounded-lg px-3 py-3">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Contraseña *</label>
            <input type="password" name="password" required minlength="6" class="w-full border rounded-lg px-3 py-3">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Rol *</label>
            <select name="role" required class="w-full border rounded-lg px-3 py-3">
                {% for r in roles %}<option value="{{ r }}">{{ r|capitalize }}</option>{% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Planta asignada *</label>
            <select name="plant" required class="w-full border rounded-lg px-3 py-3">
                {% for p in plants %}<option value="{{ p }}">{{ p }}</option>{% endfor %}
            </select>
        </div>
        <button type="submit" class="w-full bg-blue-900 text-white font-bold py-3 rounded-xl">Crear usuario</button>
    </form>
</div>
{% endblock %}
