{% extends "base.html" %}
{% block title %}Editar {{ equipment.code }} — MTR{% endblock %}
{% block content %}

<div class="max-w-2xl mx-auto">
  <div class="mb-6">
    <a href="/equipment/{{ equipment.id }}" class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 mb-3">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      {{ equipment.code }}
    </a>
    <h1 class="text-xl font-semibold text-gray-900">Editar equipo</h1>
  </div>

  {% include "partials/_error.html" %}

  <form method="post" action="/equipment/{{ equipment.id }}/edit" class="space-y-4">
    <div class="bg-white border border-gray-100 rounded-2xl shadow-sm p-5">
      <h2 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-4">Identificación</h2>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Código <span class="text-red-400">*</span></label>
          <input type="text" name="code" required value="{{ equipment.code }}"
            class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-amber-500 bg-gray-50 uppercase">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Planta <span class="text-red-400">*</span></label>
          <select name="plant" required class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 bg-gray-50">
            {% for p in plants %}
            <option value="{{ p }}" {% if equipment.plant == p %}selected{% endif %}>{{ p }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Nombre / Descripción <span class="text-red-400">*</span></label>
          <input type="text" name="name" required value="{{ equipment.name }}"
            class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 bg-gray-50">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Categoría</label>
          <select name="category" class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 bg-gray-50">
            <option value="">Sin especificar</option>
            {% for c in categories %}
            <option value="{{ c }}" {% if equipment.category == c %}selected{% endif %}>{{ c|capitalize }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Tipo de trabajo</label>
          <select name="work_type_code" class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 bg-gray-50">
            <option value="">Sin especificar</option>
            {% for code, label in work_type_codes.items() %}
            <option value="{{ code }}" {% if equipment.work_type_code == code %}selected{% endif %}>{{ code }} — {{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Marca</label>
          <input type="text" name="brand" value="{{ equipment.brand or '' }}"
            class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 bg-gray-50">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Modelo</label>
          <input type="text" name="model_name" value="{{ equipment.model_name or '' }}"
            class="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 bg-gray-50">
        </div>
        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Notas</label>
          <textarea name="notes" rows="2"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 bg-gray-50 resize-y">{{ equipment.notes or '' }}</textarea>
        </div>
        <div class="col-span-2 flex items-center gap-2">
          <input type="checkbox" name="active" id="active-check" value="on" {% if equipment.active %}checked{% endif %}
            class="rounded border-gray-300 text-amber-500 focus:ring-amber-500">
          <label for="active-check" class="text-sm text-gray-700">Equipo activo</label>
        </div>
      </div>
    </div>

    <button type="submit"
      class="w-full bg-amber-500 hover:bg-amber-600 text-white font-semibold py-4 rounded-2xl text-sm shadow-sm">
      Guardar cambios
    </button>
  </form>
</div>

{% endblock %}
