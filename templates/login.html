<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — MTR Gestión</title>
  <link rel="icon" href="/static/logo_mtr.png">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="h-full bg-gray-50 flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <img src="/static/logo_mtr.png" alt="MTR" class="w-16 h-16 object-contain mx-auto mb-3">
      <h1 class="text-2xl font-bold text-gray-900">MTR Gestión</h1>
      <p class="text-gray-500 text-sm mt-1">Plataforma de gestión operativa interna</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      {% include "partials/_error.html" %}

      <form method="post" action="/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
          <input type="email" name="email" required autocomplete="email"
            placeholder="tu@empresa.com"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent placeholder-gray-400 bg-gray-50">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Contraseña</label>
          <input type="password" name="password" required autocomplete="current-password"
            placeholder="••••••••"
            class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent placeholder-gray-400 bg-gray-50">
        </div>
        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl text-sm shadow-sm mt-2">
          Ingresar
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">MTR San Nicolás · Uso interno</p>
  </div>

</body>
</html>
