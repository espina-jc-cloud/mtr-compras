{% extends "base.html" %}
{% block title %}{{ "Editar" if supplier else "Nuevo" }} proveedor — MTR{% endblock %}
{% block content %}

<div class="max-w-lg mx-auto">
  <div class="mb-6">
    <a href="/suppliers" class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 mb-3">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Proveedores
    </a>
    <h1 class="text-xl font-semibold text-gray-900">{{ "Editar proveedor" if supplier else "Nuevo proveedor" }}</h1>
  </div>

  {% if error %}
  <div class="flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 mb-5 text-sm">
    <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="{{ '/suppliers/' + supplier.id|string + '/edit' if supplier else '/suppliers/new' }}"
        class="bg-white border border-gray-100 rounded-2xl shadow-sm p-6 space-y-4">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5">Nombre <span class="text-red-400">*</span></label>
      <input type="text" name="name" required value="{{ supplier.name if supplier else '' }}"
        placeholder="Razón social o nombre comercial"
        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50 placeholder-gray-400">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5">CUIT</label>
      <input type="text" name="cuit" value="{{ supplier.cuit if supplier else '' }}"
        placeholder="20-12345678-9"
        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50 placeholder-gray-400 font-mono">
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Contacto</label>
        <input type="text" name="contact_name" value="{{ supplier.contact_name if supplier else '' }}"
          placeholder="Nombre del vendedor"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50 placeholder-gray-400">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Teléfono</label>
        <input type="tel" name="contact_phone" value="{{ supplier.contact_phone if supplier else '' }}"
          placeholder="+54 336 000-0000"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50 placeholder-gray-400">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
      <input type="email" name="email" value="{{ supplier.email if supplier else '' }}"
        placeholder="ventas@proveedor.com"
        class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50 placeholder-gray-400">
    </div>

    {% if supplier %}
    <div class="flex items-center gap-3 pt-1">
      <input type="checkbox" name="active" id="active" {% if supplier.active %}checked{% endif %}
        class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
      <label for="active" class="text-sm font-medium text-gray-700">Proveedor activo</label>
    </div>
    {% endif %}

    <div class="flex gap-3 pt-2">
      <a href="/suppliers" class="flex-1 flex items-center justify-center border border-gray-200 rounded-xl py-3 text-sm font-medium text-gray-600 hover:bg-gray-50">
        Cancelar
      </a>
      <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl text-sm shadow-sm">
        Guardar proveedor
      </button>
    </div>
  </form>
</div>

{% endblock %}
