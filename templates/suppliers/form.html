{% extends "base.html" %}
{% block title %}{{ "Editar" if supplier else "Nuevo" }} Proveedor — MTR{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <a href="/suppliers" class="text-blue-600 text-sm">← Proveedores</a>
    <h2 class="text-2xl font-bold text-gray-800 mt-2 mb-6">{{ "Editar" if supplier else "Nuevo" }} proveedor</h2>
    {% if error %}<div class="bg-red-50 border border-red-300 text-red-700 rounded-lg px-4 py-3 mb-4">{{ error }}</div>{% endif %}
    <form method="post" action="{{ '/suppliers/' + supplier.id|string + '/edit' if supplier else '/suppliers/new' }}" class="bg-white rounded-xl shadow-sm p-6 space-y-4">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Nombre *</label>
            <input type="text" name="name" required value="{{ supplier.name if supplier else '' }}" class="w-full border rounded-lg px-3 py-3">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">CUIT</label>
            <input type="text" name="cuit" value="{{ supplier.cuit if supplier else '' }}" placeholder="20-12345678-9" class="w-full border rounded-lg px-3 py-3">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Nombre contacto</label>
            <input type="text" name="contact_name" value="{{ supplier.contact_name if supplier else '' }}" class="w-full border rounded-lg px-3 py-3">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Teléfono</label>
            <input type="tel" name="contact_phone" value="{{ supplier.contact_phone if supplier else '' }}" class="w-full border rounded-lg px-3 py-3">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
            <input type="email" name="email" value="{{ supplier.email if supplier else '' }}" class="w-full border rounded-lg px-3 py-3">
        </div>
        {% if supplier %}
        <div class="flex items-center gap-2">
            <input type="checkbox" name="active" id="active" {% if supplier.active %}checked{% endif %} class="w-4 h-4">
            <label for="active" class="text-sm">Activo</label>
        </div>
        {% endif %}
        <button type="submit" class="w-full bg-blue-900 text-white font-bold py-3 rounded-xl">Guardar</button>
    </form>
</div>
{% endblock %}
