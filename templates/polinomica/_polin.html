{# Layout compartido Polinómica CNA: tokens de diseño + header sticky + tabs. #}
<style>
  .pol { --navy:#0B1F3A; --navy2:#122848; --gold:#C9A84C; --gold-light:#E8C97A;
    --pbg:#F4F6F9; --pcard:#FFFFFF; --pborder:#E0E6EF; --ptext:#1A2B3C;
    --pmuted:#6B7A8D; --pgreen:#1A7A4A; --pred:#B03030; --pblue:#1A5FAB; --pamber:#8B5E0A;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--ptext); }
  .pol .p-header { background: var(--navy); border-radius: 10px; padding: 16px 22px;
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    position: sticky; top: 0; z-index: 30; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
  .pol .p-header img { width: 42px; height: 42px; background: #fff; border-radius: 8px; padding: 3px; object-fit: contain; }
  .pol .p-title h1 { color: #fff; font-size: 17px; font-weight: 700; margin: 0; line-height: 1.2; }
  .pol .p-title p { color: var(--gold-light); font-size: 12px; margin: 0; }
  .pol .p-badge { background: rgba(201,168,76,.15); border: 1px solid var(--gold);
    color: var(--gold-light); font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 99px; white-space: nowrap; }
  .pol .p-nav { background: var(--navy2); border-radius: 0 0 10px 10px; margin-top: -8px;
    padding: 12px 14px 8px; display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .pol .p-tab { color: #b9c4d8; font-size: 13px; font-weight: 600; padding: 7px 13px;
    border-radius: 8px; text-decoration: none; transition: all .15s; border-bottom: 2px solid transparent; }
  .pol .p-tab:hover { background: rgba(255,255,255,.07); color: #fff; }
  .pol .p-tab.on { color: #fff; background: rgba(201,168,76,.14); border-bottom-color: var(--gold); }
  .pol .p-sep { width: 1px; height: 20px; background: rgba(255,255,255,.18); margin: 0 6px; }
  .pol .p-tab.gold { color: var(--gold-light); }
  .pol .p-card { background: var(--pcard); border: 1px solid var(--pborder); border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,.07); }
  .pol .metric { padding: 16px 18px; }
  .pol .metric .v { font-size: 28px; font-weight: 700; line-height: 1.1; color: var(--ptext); }
  .pol .metric .l { font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--pmuted); margin-bottom: 6px; }
  .pol .chip { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 99px; margin-top: 7px; }
  .pol .chip.g { background: #E7F3EC; color: var(--pgreen); }
  .pol .chip.r { background: #F8E8E8; color: var(--pred); }
  .pol .chip.b { background: #E8F0FA; color: var(--pblue); }
  .pol .chip.a { background: #F7EFD8; color: var(--pamber); }
  .pol table.p-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  .pol table.p-table thead th { background: var(--navy); color: #fff; text-align: left;
    font-size: 11px; letter-spacing: .06em; text-transform: uppercase; padding: 11px 14px; }
  .pol table.p-table thead th:first-child { border-radius: 10px 0 0 0; }
  .pol table.p-table thead th:last-child { border-radius: 0 10px 0 0; }
  .pol table.p-table td { padding: 11px 14px; border-bottom: 1px solid var(--pborder); }
  .pol table.p-table tbody tr { transition: background .15s; }
  .pol table.p-table tbody tr:hover { background: #F7F9FC; }
  .pol .t-base { color: var(--pmuted); font-size: 12px; }
  .pol .t-vig { color: var(--navy); font-weight: 700; font-size: 14px; white-space: nowrap; }
  .pol .t-aum { color: var(--pgreen); font-weight: 700; }
  .pol .pbar { height: 7px; background: #E9EDF3; border-radius: 99px; overflow: hidden; min-width: 90px; }
  .pol .pbar i { display: block; height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, #1A7A4A, #2ECC71); }
  .pol .in-gold { background: #FFFACC; border: 1.5px solid var(--gold); border-radius: 8px;
    font-size: 18px; font-weight: 700; text-align: right; padding: 9px 12px; width: 100%; color: var(--ptext); }
  .pol .in-gold:focus { outline: 2px solid var(--gold); }
  .pol .idx-card { border-top: 3px solid var(--pblue); }
  .pol .idx-card.gold-top { border-top-color: var(--gold); }
  .pol .p-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700;
    padding: 9px 16px; border-radius: 8px; border: 0; cursor: pointer; transition: all .15s; text-decoration: none; }
  .pol .p-btn.navy { background: var(--navy); color: #fff; }
  .pol .p-btn.navy:hover { background: var(--navy2); }
  .pol .p-btn.red { background: var(--pred); color: #fff; }
  .pol .p-btn.red:hover { filter: brightness(1.1); }
  .pol .p-btn.ghost { background: #EDF1F6; color: var(--ptext); }
  .pol input[type="text"], .pol input[type="date"], .pol textarea {
    border: 1px solid var(--pborder); border-radius: 8px; padding: 9px 12px; font-size: 13.5px; width: 100%; background: #fff; }
  .pol .hl-row { background: #FFFBE6 !important; border-left: 3px solid var(--gold); }
  .pol .acum-navy { background: var(--navy); color: #fff; border-radius: 10px; padding: 16px 18px; }
  .pol .acum-navy h3 { color: var(--gold-light); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; margin: 0 0 10px; }
  .pol .acum-navy .row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.08); }
  .pol .acum-navy .row:last-child { border-bottom: 0; }
</style>

<div class="pol max-w-6xl mx-auto">
  <div class="p-header">
    <div style="display:flex;align-items:center;gap:13px">
      <img src="/static/logo_mtr.png" alt="MTR">
      <div class="p-title">
        <h1>MTR S.A.</h1>
        <p>Polinómica CNA</p>
      </div>
    </div>
    <span class="p-badge">Vigente: {{ mes_vigente }}</span>
  </div>
  <nav class="p-nav">
    <a href="/polinomica" class="p-tab {{ 'on' if tab == 'dashboard' }}">📋 Tarifas vigentes</a>
    <a href="/polinomica/actualizar" class="p-tab {{ 'on' if tab == 'actualizar' }}">✏️ Actualizar mes</a>
    <a href="/polinomica/historial" class="p-tab {{ 'on' if tab == 'historial' }}">📊 Historial</a>
    <a href="/polinomica/acumulados" class="p-tab {{ 'on' if tab == 'acumulados' }}">📈 Acumulados</a>
    <span class="p-sep"></span>
    <a href="/polinomica/remito" class="p-tab gold {{ 'on' if tab == 'remito' }}">📄 Generar remito</a>
    <a href="/polinomica/remitos" class="p-tab gold" style="font-size:12px">🗂 Guardados</a>
  </nav>
