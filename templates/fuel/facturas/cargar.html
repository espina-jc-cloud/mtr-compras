{% extends "base.html" %}
{% block title %}Cargar factura combustible{% endblock %}
{% block content %}

<h1 class="text-2xl font-bold mb-6">Cargar factura combustible</h1>

<form method="post" action="/fuel/invoices/nueva" class="space-y-5">

  <div class="bg-white rounded-2xl border p-5 grid md:grid-cols-2 gap-4">
    <input name="numero_factura" placeholder="Nro factura" class="border rounded-xl px-3 py-2">
    <input name="supplier_name" placeholder="Proveedor" class="border rounded-xl px-3 py-2">

    <select name="company" class="border rounded-xl px-3 py-2" required>
      <option value="">Empresa</option>
      {% for c in companies %}
      <option value="{{ c }}">{{ c }}</option>
      {% endfor %}
    </select>

    <select name="tipo_comprobante" class="border rounded-xl px-3 py-2">
      {% for t in tipos_comprobante %}
      <option value="{{ t }}">{{ t }}</option>
      {% endfor %}
    </select>

    <input type="date" name="fecha_emision" class="border rounded-xl px-3 py-2">
    <input name="monto_total" placeholder="Monto total" class="border rounded-xl px-3 py-2">
    <input name="cuit_proveedor" placeholder="CUIT proveedor" class="border rounded-xl px-3 py-2 md:col-span-2">
    <textarea name="observaciones" placeholder="Observaciones" class="border rounded-xl px-3 py-2 md:col-span-2"></textarea>
  </div>

  <div class="bg-white rounded-2xl border p-5">
    <h2 class="font-semibold mb-3">Seleccionar cargas de combustible</h2>

    {% if cargas %}
      <div class="space-y-2 max-h-96 overflow-y-auto">
        {% for c in cargas %}
        <label class="flex items-center justify-between border rounded-xl px-4 py-3 hover:bg-gray-50 cursor-pointer">
          <div>
            <input type="checkbox" name="carga_ids" value="{{ c.id }}" class="mr-2">
            <strong>{{ c.vehicle_plate }}</strong>
            <span class="text-gray-500">· {{ c.company }}{% if c.plant %} · {{ c.plant }}{% endif %}</span>
            <span class="text-gray-500">· {{ c.fuel_date|fmt_date("%d/%m/%Y") }}</span>
          </div>
          <div class="text-right">
            <div>{{ c.liters|fmt_num(1) }} L</div>
            {% if c.amount %}<div class="text-gray-500">$ {{ c.amount|fmt_num }}</div>{% endif %}
          </div>
        </label>
        {% endfor %}
      </div>
    {% else %}
      <p class="text-gray-500">No hay cargas libres para vincular.</p>
    {% endif %}
  </div>

  <button class="bg-orange-500 hover:bg-orange-600 text-white px-5 py-2 rounded-xl font-semibold">
    Guardar factura
  </button>

</form>

{% endblock %}
